// ── PERSISTENCE ─────────────────────────────────────────────────────────────
// ── BULLETPROOF PERSISTENCE ────────────────────────────────────────────────
// Jobs are NEVER deleted from storage unless:
// 1. Company officially removes/expires the posting (confirmed via URL check)
// 2. User manually clicks "Clear Closed"
// All other jobs stay permanently in the portal

function save(){
  try{
    // Save full job data minus heavy description field to save space
    const slim=jobs.map(j=>{
      const{description,...r}=j;
      return{...r, _saved: new Date().toISOString()};
    });
    // Use multiple storage keys if data is large (5MB limit safeguard)
    const data=JSON.stringify(slim);
    if(data.length < 4000000){ // under 4MB — save directly
      localStorage.setItem(SK+":jobs", data);
    } else {
      // Split into chunks if too large
      const half=Math.floor(slim.length/2);
      localStorage.setItem(SK+":jobs", JSON.stringify(slim.slice(0,half)));
      localStorage.setItem(SK+":jobs2", JSON.stringify(slim.slice(half)));
    }
    localStorage.setItem(SK+":tracker", JSON.stringify(tracker));
    localStorage.setItem(SK+":lastSave", new Date().toISOString());
    console.log("Saved",jobs.length,"jobs to localStorage");
  }catch(e){
    console.warn("Save failed:",e);
    // If quota exceeded, save only most recent 50 jobs
    try{
      const slim50=jobs.slice(0,50).map(j=>{const{description,...r}=j;return r;});
      localStorage.setItem(SK+":jobs", JSON.stringify(slim50));
    }catch(e2){}
  }
}

function load(){
  try{
    // Load from primary + overflow storage
    let saved=[];
    const sj=localStorage.getItem(SK+":jobs");
    const sj2=localStorage.getItem(SK+":jobs2");
    if(sj) saved=[...saved,...JSON.parse(sj)];
    if(sj2) saved=[...saved,...JSON.parse(sj2)];

    if(saved.length>0){
      // Restore jobs with their saved status — NEVER reset to unknown
      // Only "unknown" status gets re-verified, "open" and "closed" are kept as-is
      jobs=saved.map(j=>({...j, _st: j._st||"unknown"}));
      const lastSave=localStorage.getItem(SK+":lastSave");
      console.log("Loaded",jobs.length,"saved jobs. Last save:",lastSave);
    }

    const st=localStorage.getItem(SK+":tracker");
    if(st) tracker=JSON.parse(st);
  }catch(e){
    console.warn("Load failed:",e);
    jobs=[];tracker=[];
  }
}

// ── SMART JOB STATUS VERIFIER ──────────────────────────────────────────────
// Checks if a job URL is still active on the company website
// Only marks as CLOSED if we get a DEFINITIVE signal that it's gone
// If uncertain → keeps as "open" (benefit of the doubt)
async function checkJobAlive(j){
  if(!j.redirect_url) return j._st||"unknown";
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(), 10000);
    const r=await fetch(
      "https://api.allorigins.win/raw?url="+encodeURIComponent(j.redirect_url),
      {signal:controller.signal}
    );
    clearTimeout(timeout);
    if(!r.ok) return "unknown"; // server error — don't mark closed
    const txt=(await r.text()).toLowerCase();

    // Only mark CLOSED if we see definitive closed signals
    const CLOSED_SIGNALS=[
      "job no longer available","position has been filled",
      "this job has expired","job posting has expired",
      "no longer accepting applications","this position is closed",
      "job is closed","posting is no longer active",
      "position has been filled","this role has been filled",
      "job not found","404 - page not found",
      "this opportunity is no longer available"
    ];
    if(CLOSED_SIGNALS.some(s=>txt.includes(s))) return "closed";

    // Still has job-like content → definitely open
    const OPEN_SIGNALS=["apply","job description","responsibilities","qualifications","submit"];
    if(OPEN_SIGNALS.some(s=>txt.includes(s))) return "open";

    return "unknown"; // uncertain — keep existing status
  }catch(e){
    return "unknown"; // network error — keep existing status, don't remove
  }
}

// Verify jobs in background — runs every 10 minutes
// Only updates status, NEVER removes jobs
async function verifyJobsBackground(){
  console.log("Starting background job verification...");
  // Verify jobs that haven't been checked recently (older than 2 hours)
  const twoHoursAgo=Date.now()-(2*60*60*1000);
  const toCheck=jobs
    .filter(j=>j.redirect_url && j._st!=="closed")
    .filter(j=>!j._lastCheck || new Date(j._lastCheck).getTime()<twoHoursAgo)
    .slice(0,5); // check 5 at a time to not hammer servers

  let changed=false;
  for(const j of toCheck){
    const newStatus=await checkJobAlive(j);
    j._lastCheck=new Date().toISOString();
    if(newStatus!=="unknown" && newStatus!==j._st){
      j._st=newStatus;
      changed=true;
      console.log(`Job "${j.title}" status: ${newStatus}`);
    }
    // Small delay between checks
    await new Promise(r=>setTimeout(r,1000));
  }

  if(changed){ save(); render(); }
  console.log("Verification done. Checked:",toCheck.length,"jobs");
}

// ── API FETCH ────────────────────────────────────────────────────────────────
async function fetchJobs(silent){
  if(!silent){loading=true;render();}
  const term=TERMS[termIdx%TERMS.length];
  termIdx++;
  const params=new URLSearchParams({
    app_id:AID,app_key:AKEY,results_per_page:20,
    what:term,where:"united states",sort_by:"date",full_time:1
  });
  const url=BASE+"/1?"+params;
  
  // Try 4 methods to get data
  const tries=[
    ()=>fetch(url),
    ()=>fetch("https://corsproxy.io/?"+encodeURIComponent(url)),
    ()=>fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url)),
    ()=>fetch("https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(url)),
  ];
  
  let data=null;
  for(const fn of tries){
    try{
      const r=await fn();
      if(!r.ok)continue;
      const txt=await r.text();
      if(!txt||txt.trim()[0]!=="{")continue;
      const parsed=JSON.parse(txt);
      if(parsed?.results?.length){data=parsed;break;}
    }catch(e){continue;}
  }
  
  if(data?.results){
    // Process new results — tag and score them
    const incoming=data.results.map(j=>{
      const t=getTags(j);
      return{...j,
        _score:scoreJob(j),_tags:t,_wt:getWT(j),_visa:visaInfo(j),
        _ts:new Date(j.created||0).getTime(),
        _st:"unknown",_firstSeen:new Date().toISOString()
      };
    });

    // ADDITIVE ONLY: only add jobs we haven't seen before
    // Existing jobs are NEVER touched or removed
    const existingIds=new Set(jobs.map(j=>j.id));
    const fresh=incoming.filter(j=>!existingIds.has(j.id));

    if(fresh.length>0){
      newIds=new Set(fresh.map(j=>j.id));
      setTimeout(()=>{newIds=new Set();render();},6000);

      // Merge: new jobs at top, old jobs preserved exactly as they are
      jobs=[...fresh,...jobs].sort((a,b)=>(b._ts||0)-(a._ts||0));
      save();
      showToast("✓ "+fresh.length+" new jobs! Total saved: "+jobs.length);
    } else {
      if(silent) showToast("✓ "+jobs.length+" jobs in portal (keyword "+(termIdx%TERMS.length+1)+"/"+TERMS.length+")");
    }
    lastUp=new Date();
  } else {
    if(!silent)showToast("⚠ API unavailable — showing saved jobs",false);
  }
  
  loading=false;
  cdNum=20;
  render();
}

  const j=jobs.find(x=>x.id===id);if(!j)return;
  if(!tracker.find(t=>t.id===id)){
    tracker.push({...j,_s:"Applied",_d:new Date().toLocaleDateString()});
    save();
  }
  showToast("✓ Applied: "+j.title);
  render();
}
function updStatus(id,s){
  const t=tracker.find(t=>t.id===id);
  if(t){t._s=s;save();}
  render();
}
function clearClosed(){
  if(confirm("Remove all 🔒 closed/expired jobs from the list?")){
    jobs=jobs.filter(j=>j._st!=="closed");
    save();render();
    showToast("✓ Closed jobs removed");
  }
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function getFiltered(){
  return jobs
    .filter(j=>j._score>=fMin)
    .filter(j=>fWT==="all"||j._wt===fWT)
    .filter(j=>fVisa==="all"||
      (fVisa==="sp"?j._visa?.s==="sp":
       fVisa==="nco"?j._visa?.s!=="co":
       ["sp","ok","ns"].includes(j._visa?.s)))
    .filter(j=>fStatus==="all"?true:fStatus==="closed"?j._st==="closed":j._st!=="closed")
    .slice(0,80);
}

    <div class="card" style="padding:22px;flex:1 1 260px;">
      <div style="display:flex;gap:14px;align-items:center;margin-bottom:18px;">
        <div style="width:50px;height:50px;background:linear-gradient(135deg,#a78bfa,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#08070f;flex-shrink:0;font-family:'Syne',sans-serif;">RA</div>
        <div>
          <div style="font-size:15px;font-weight:800;font-family:'Syne',sans-serif;">${PROFILE.name}</div>
          <div style="color:#a78bfa;font-size:11px;margin-top:2px;">${PROFILE.role}</div>
          <div style="color:var(--mut);font-size:11px;margin-top:1px;">${PROFILE.loc}</div>
        </div>
      </div>
      <div style="background:#0a1a0a;border:1px solid #0e4028;border-radius:6px;padding:7px 12px;font-size:11px;color:#00e8a2;margin-bottom:14px;">✓ ${PROFILE.visa}</div>
      <div style="font-size:9px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;">Certifications</div>
      ${PROFILE.certs.map(c=>`<div style="font-size:11px;color:#a78bfa;margin-bottom:3px;">🏆 ${c}</div>`).join("")}
      <div style="font-size:9px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;margin-top:12px;margin-bottom:7px;">Contact</div>
      <div style="font-size:11px;color:var(--mid);">${PROFILE.email}</div>
      <div style="font-size:11px;color:var(--mid);margin-top:3px;">${PROFILE.phone}</div>
    </div>
    <div class="card" style="padding:22px;flex:2 1 380px;">
      <div style="font-size:9px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;">Skills (${PROFILE.skills.length})</div>
      ${PROFILE.skills.map(s=>`<span class="tag" style="margin:2px;text-transform:uppercase;font-size:9px;">${s}</span>`).join("")}
    </div>
    <div class="card" style="padding:22px;flex:3 1 460px;">
      <div style="font-size:9px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;">Experience</div>
      ${PROFILE.exp.map(e=>`<div style="border-left:2px solid var(--brd);padding-left:16px;margin-bottom:20px;position:relative;">
        <div style="position:absolute;left:-5px;top:5px;width:8px;height:8px;background:#a78bfa;border-radius:50%;"></div>
        <div style="font-weight:700;font-size:13px;font-family:'Syne',sans-serif;">${e.role}</div>
        <div style="color:#a78bfa;font-size:12px;">${e.company}</div>
        <div style="color:var(--mut);font-size:10px;margin-bottom:6px;">${e.period}</div>
        ${e.bullets.map(b=>`<div style="font-size:11px;color:var(--mid);margin-bottom:2px;">• ${b}</div>`).join("")}
      </div>`).join("")}
    </div>
  </div>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
load();   // Load saved jobs instantly
render(); // Show UI immediately with saved data
startTimers();
fetchJobs(false);
// Background job status verifier — runs every 10 minutes
setInterval(()=>verifyJobsBackground(), 10*60*1000);
setTimeout(()=>verifyJobsBackground(), 15000); // first check after 15s
</script>
</body>
</html>
